      { label: "【住宿】機場到飯店的交通路線已確認（含備用方案）" },
      { label: "【住宿】重要場館地圖截圖已儲存（可離線查看）" },
      { label: "【影像】記憶卡已清空或備妥足夠容量，雲端自動備份已開啟" },
      { label: "【安全】台灣駐外辦事處電話已存入手機聯絡人", important: true },
      { label: "【安全】緊急醫療翻譯卡（血型、過敏、病史）已帶" },
      { label: "【安全】備用現金已分開存放（包包、行李箱各一份）" },
      { label: "【居家】家人 / 親友已知悉完整行程與緊急聯絡方式", important: true },
      { label: "【居家】寵物已安排妥善照顧，飼料備量足夠" },
      { label: "【居家】家中門窗、瓦斯、電器（尤其電熱水器）已確認關閉" },
      { label: "【居家】冰箱易腐食物已處理，飲水機已關閉" },
      { label: "【居家】備用鑰匙已交給鄰居 / 家人" },
      { label: "【居家】重要郵件 / 包裹已請人代收或暫停投遞" },
    ]
  },
];

// In-memory state (no localStorage in artifact env)
const checkState = {};

function buildChecklist() {
  const container = document.getElementById("checklist");
  container.innerHTML = "";
  data.forEach((section, si) => {
    const card = document.createElement("div");
    card.className = "section-card";
    const header = document.createElement("div");
    header.className = "section-header";
    header.innerHTML = `
      <div class="section-title">
        <span class="section-emoji">${section.emoji}</span>
        <span>${section.title}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="section-badge" id="badge-${si}">0 / ${section.items.length}</span>
        <span class="section-toggle open" id="toggle-${si}">▼</span>
      </div>
    `;
    const list = document.createElement("div");
    list.className = "items-list open";
    list.id = `list-${si}`;
    section.items.forEach((item, ii) => {
      const id = `item-${si}-${ii}`;
      const row = document.createElement("div");
      row.className = "item" + (item.important ? " important" : "");
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.id = id;
      cb.dataset.section = si;
      if (checkState[id]) { cb.checked = true; row.classList.add("checked"); }
      const labelWrap = document.createElement("label");
      labelWrap.className = "item-label";
      labelWrap.htmlFor = id;
      labelWrap.innerHTML = item.label + (item.note ? `<div class="item-note">${item.note}</div>` : "");
      cb.addEventListener("change", () => {
        checkState[id] = cb.checked;
        row.classList.toggle("checked", cb.checked);
        updateProgress();
      });
      row.appendChild(cb);
      row.appendChild(labelWrap);
      list.appendChild(row);
    });
    header.addEventListener("click", () => {
      const isOpen = list.classList.toggle("open");
      document.getElementById(`toggle-${si}`).classList.toggle("open", isOpen);
    });
    card.appendChild(header);
    card.appendChild(list);
    container.appendChild(card);
  });
  updateProgress();
}

function updateProgress() {
  const all = document.querySelectorAll(".items-list input[type=checkbox]");
  const done = document.querySelectorAll(".items-list input[type=checkbox]:checked");
  const pct = all.length ? Math.round((done.length / all.length) * 100) : 0;
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressLabel").textContent = `已完成 ${done.length} / ${all.length} 項（${pct}%）`;
  data.forEach((section, si) => {
    const sAll = document.querySelectorAll(`input[data-section="${si}"]`);
    const sDone = document.querySelectorAll(`input[data-section="${si}"]:checked`);
    const badge = document.getElementById(`badge-${si}`);
    if (!badge) return;
    badge.textContent = `${sDone.length} / ${sAll.length}`;
    badge.className = (sDone.length === sAll.length && sAll.length > 0) ? "section-badge done" : "section-badge";
  });
}

function resetAll() {
  if (!confirm("確定要重設所有勾選項目嗎？")) return;
  Object.keys(checkState).forEach(k => delete checkState[k]);
  document.querySelectorAll(".items-list input[type=checkbox]").forEach(cb => {
    cb.checked = false;
    cb.closest(".item").classList.remove("checked");
  });
  updateProgress();
}

function expandAll() {
  document.querySelectorAll(".items-list").forEach((el, i) => {
    el.classList.add("open");
    const t = document.getElementById(`toggle-${i}`);
    if (t) t.classList.add("open");
  });
}

function collapseAll() {
  document.querySelectorAll(".items-list").forEach((el, i) => {
    el.classList.remove("open");
    const t = document.getElementById(`toggle-${i}`);
    if (t) t.classList.remove("open");
  });
}

buildChecklist();
</script>
</body>
</html>
